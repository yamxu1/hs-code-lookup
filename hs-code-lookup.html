// 搜索功能
function search(query) {
  query = query.trim().toLowerCase();
  if (!query) {
    document.getElementById('results').innerHTML = '';
    document.getElementById('clearBtn').style.display = 'none';
    return;
  }
  document.getElementById('clearBtn').style.display = 'block';

  const results = products.filter(p => {
    const searchStr = [p.name, ...(p.aliases || [])].join(' ').toLowerCase();
    return searchStr.includes(query) || p.hsCode.includes(query);
  });

  if (results.length === 0) {
    document.getElementById('results').innerHTML = `
      <div class="no-result">
        <div class="emoji">🤔</div>
        <p>未找到匹配结果<br>
        试试其他关键词，或前往 <a href="https://hts.usitc.gov/" target="_blank">hts.usitc.gov</a> 官方查询</p>
      </div>
    `;
    return;
  }

  document.getElementById('results').innerHTML = results.map((p, i) => `
    <div class="result-item" onclick="showDetail(${products.indexOf(p)})">
      <div class="product-name">${p.name} ${p.aliases ? p.aliases.slice(0,2).map(a => `<span class="tag">${a}</span>`).join('') : ''}</div>
      <div class="hs-code">${formatCode(p.hsCode)}</div>
      <div class="desc">${p.desc}</div>
      <span class="duty ${p.dutyGeneral === 'Free' ? 'free' : ''}">一般税率: ${p.dutyGeneral}</span>
    </div>
  `).join('');
}

function formatCode(code) {
  return code.replace(/\./g, '<span class="dot">.</span>');
}

function showDetail(index) {
  const p = products[index];
  const modal = document.getElementById('detailModal');
  const content = document.getElementById('detailContent');

  content.innerHTML = `
    <button class="close-btn" onclick="closeModal(event, true)">✕</button>
    <h2>${p.name}</h2>
    <div style="color:#888;font-size:13px;margin-bottom:8px;">${p.descEn || ''}</div>
    <div class="code-big">${p.hsCode}</div>
    <table>
      <tr><th>章节</th><td>${p.chapter}</td></tr>
      <tr><th>商品描述</th><td>${p.desc}</td></tr>
      <tr><th>一般税率</th><td style="font-weight:600;color:#2e7d32;">${p.dutyGeneral}</td></tr>
      <tr><th>优惠税率</th><td>${p.dutySpecial}</td></tr>
      <tr><th>第二栏税率</th><td>${p.dutyColumn2}</td></tr>
      <tr><th>计量单位</th><td>${p.unit}</td></tr>
    </table>
    ${p.note ? `<div class="note">💡 ${p.note}</div>` : ''}
    <div style="margin-top:16px;text-align:center;">
      <a href="https://hts.usitc.gov/" target="_blank" style="color:#4361ee;font-size:13px;text-decoration:none;">
        前往 hts.usitc.gov 验证 →
      </a>
    </div>
  `;

  modal.classList.add('active');
}

function closeModal(event, force) {
  if (force || event.target === document.getElementById('detailModal')) {
    document.getElementById('detailModal').classList.remove('active');
  }
}

function quickSearch(term) {
  document.getElementById('searchInput').value = term;
  search(term);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('clearBtn').style.display = 'none';
}

// 输入监听
document.getElementById('searchInput').addEventListener('input', function(e) {
  search(e.target.value);
});

// 回车键
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    search(e.target.value);
  }
});
</script>
